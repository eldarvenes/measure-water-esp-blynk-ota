[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
lib_deps =
    blynkkk/Blynk
    mobizt/ESP Mail Client
    bblanchon/ArduinoJson

; Same firmware, men flashar over WiFi på lokalnettet (krev å vere på same nett
; som ESP-en). For oppdatering på avstand: bruk HTTP-pull OTA (Blynk-knapp) i staden.
[env:d1_mini_ota]
extends = env:d1_mini
upload_protocol = espota
upload_port = vasstank.local

; Test-kort: ein vanleg NodeMCU 8266 (same chip), for å prøve HTTP-pull OTA.
[env:nodemcu_test]
extends = env:d1_mini
board = nodemcuv2
